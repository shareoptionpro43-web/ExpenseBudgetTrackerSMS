name: 🏠 Expense Tracker — Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'

jobs:

  # ─────────────────────────────────────────────────────────────────
  # JOB 1 — Build Debug APK (every push & PR)
  # ─────────────────────────────────────────────────────────────────
  build:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 📦 Bootstrap Gradle Wrapper JAR
        run: |
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          GRADLE_VERSION="8.6"
          if [ ! -f "$WRAPPER_JAR" ]; then
            echo "Downloading gradle-wrapper.jar for Gradle $GRADLE_VERSION..."
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$WRAPPER_JAR" || \
            (
              curl -fsSL \
                "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" \
                -o /tmp/gradle.zip && \
              unzip -j /tmp/gradle.zip \
                "gradle-${GRADLE_VERSION}/lib/gradle-wrapper-*.jar" \
                -d /tmp/gradle-wrapper/ && \
              cp /tmp/gradle-wrapper/gradle-wrapper-*.jar "$WRAPPER_JAR"
            ) || \
            (sudo apt-get install -y gradle -q && gradle wrapper --gradle-version=$GRADLE_VERSION)
            echo "Wrapper JAR ready: $(ls -lh $WRAPPER_JAR)"
          else
            echo "Wrapper JAR already present: $(ls -lh $WRAPPER_JAR)"
          fi

      - name: 🔧 Make gradlew executable
        run: chmod +x gradlew

      - name: 💾 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: ✅ Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: 🔍 Run Lint
        run: ./gradlew lint --no-daemon --stacktrace
        continue-on-error: true

      - name: 🧪 Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace
        continue-on-error: true

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 🔎 Verify APK exists
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo "APK built successfully!"
            ls -lh "$APK_PATH"
          else
            echo "APK not found!"
            find app/build/outputs -name "*.apk" 2>/dev/null || echo "No APKs found"
            exit 1
          fi

      - name: 📝 Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/HomeExpenseTracker-v1.0.${{ github.run_number }}-debug.apk
          ls -lh artifacts/

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HomeExpenseTracker-debug-${{ github.run_number }}
          path: artifacts/HomeExpenseTracker-v1.0.${{ github.run_number }}-debug.apk
          retention-days: 30
          if-no-files-found: error

      - name: 📊 Upload Lint Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results-${{ github.run_number }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
          if-no-files-found: ignore

      - name: 📊 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7
          if-no-files-found: ignore

      - name: 📋 Build Summary
        if: always()
        run: |
          echo "## 🏠 Home Expense Tracker — Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          APK="artifacts/HomeExpenseTracker-v1.0.${{ github.run_number }}-debug.apk"
          if [ -f "$APK" ]; then
            APK_SIZE=$(du -sh "$APK" | cut -f1)
            echo "### ✅ APK Built Successfully" >> $GITHUB_STEP_SUMMARY
            echo "- **Size:** $APK_SIZE" >> $GITHUB_STEP_SUMMARY
            echo "- **Download:** Actions → this run → Artifacts section" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ APK Build Failed" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────────────────────────
  # JOB 2 — Signed Release APK (main branch pushes only)
  # ─────────────────────────────────────────────────────────────────
  release:
    name: 🚀 Build Release APK
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write        # ← ADD THIS LINE
      
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 📦 Bootstrap Gradle Wrapper JAR
        run: |
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          GRADLE_VERSION="8.6"
          if [ ! -f "$WRAPPER_JAR" ]; then
            curl -fsSL \
              "https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}.0/gradle/wrapper/gradle-wrapper.jar" \
              -o "$WRAPPER_JAR" || \
            (sudo apt-get install -y gradle -q && gradle wrapper --gradle-version=$GRADLE_VERSION)
          fi

      - name: 🔧 Make gradlew executable
        run: chmod +x gradlew

      - name: 💾 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      # FIX: secrets cannot be used in `if:` conditions.
      # Instead, decode inside the run script and check if the env var is set.
      - name: 🔑 Decode Keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > app/release.keystore
            echo "KEYSTORE_PATH=release.keystore" >> $GITHUB_ENV
            echo "Keystore decoded successfully"
          else
            echo "KEYSTORE_PATH=" >> $GITHUB_ENV
            echo "No keystore secret set — building unsigned release APK"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: 🏗️ Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: 📝 Rename Release APK
        run: |
          mkdir -p artifacts
          find app/build/outputs/apk/release -name "*.apk" | head -1 | \
            xargs -I{} cp {} artifacts/HomeExpenseTracker-v1.0.${{ github.run_number }}-release.apk
          ls -lh artifacts/

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: HomeExpenseTracker-release-${{ github.run_number }}
          path: artifacts/HomeExpenseTracker-v1.0.${{ github.run_number }}-release.apk
          retention-days: 90
          if-no-files-found: error

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "🏠 Home Expense Tracker v1.0.${{ github.run_number }}"
          body: |
            ## 🏠 Home Expense & Budget Tracker

            ### ✨ Features
            - Track all household expenses with 16 categories
            - Set monthly budgets per category with progress alerts
            - Dashboard with spending summary and recent transactions
            - Analytics: pie chart by category, daily bar chart
            - Export expenses to CSV
            - Cash / Card / UPI / Bank Transfer / Wallet payment methods

            ### 📲 How to Install
            1. Download the APK below
            2. On your Android phone → **Settings → Security → Install Unknown Apps**
            3. Open the downloaded APK and tap **Install**

            ### 🔧 Build Info
            - Build: #${{ github.run_number }}
            - Commit: `${{ github.sha }}`
            - Branch: `${{ github.ref_name }}`
          files: artifacts/HomeExpenseTracker-v1.0.${{ github.run_number }}-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
